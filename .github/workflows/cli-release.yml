name: CLI Release

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing cli-v-prefixed Git tag to rebuild
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: cli-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Validate release identity
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      npm_tag: ${{ steps.metadata.outputs.npm_tag }}
      prerelease: ${{ steps.metadata.outputs.prerelease }}
      commit: ${{ steps.commit.outputs.sha }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}

      - name: Parse tag and package version
        id: metadata
        run: >-
          node scripts/cli/release-metadata.mjs
          --tag="${{ inputs.tag || github.ref_name }}"

      - name: Verify tag points at checked-out commit
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
        run: test "$(git rev-list -n 1 "$TAG")" = "$(git rev-parse HEAD)"

      - name: Record release commit
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  quality:
    name: Release quality gate
    needs: metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release helper scripts
        run: node --test scripts/cli/tests/*.test.mjs

      - name: Check generated API contract drift
        run: node scripts/cli/verify-contract-drift.mjs

      - name: Type-check, lint and test CLI
        run: |
          pnpm --filter @liteyukistudio/luna-cli typecheck
          pnpm --filter @liteyukistudio/luna-cli lint
          pnpm --filter @liteyukistudio/luna-cli test

  binary:
    name: Binary ${{ matrix.asset }}
    needs:
      - metadata
      - quality
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: bun-linux-x64-baseline
            asset: luna-linux-x64
            musl: false
          - runner: ubuntu-24.04-arm
            target: bun-linux-arm64
            asset: luna-linux-arm64
            musl: false
          - runner: ubuntu-24.04
            target: bun-linux-x64-musl-baseline
            asset: luna-linux-x64-musl
            musl: true
          - runner: macos-14
            target: bun-darwin-arm64
            asset: luna-darwin-arm64-unsigned
            musl: false
          - runner: macos-15-intel
            target: bun-darwin-x64-baseline
            asset: luna-darwin-x64-unsigned
            musl: false
          - runner: windows-2025
            target: bun-windows-x64-baseline
            asset: luna-windows-x64-unsigned.exe
            musl: false
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build binary
        shell: bash
        run: >-
          node scripts/cli/build-binary.mjs
          --target="${{ matrix.target }}"
          --output="release/binaries/${{ matrix.asset }}"

      - name: Smoke-test binary on native runner
        shell: bash
        run: >-
          node scripts/cli/smoke-command.mjs
          --command="release/binaries/${{ matrix.asset }}"
          --version="${{ needs.metadata.outputs.version }}"

      - name: Smoke-test musl binary in Alpine
        if: matrix.musl
        shell: bash
        run: |
          docker run --rm \
            -v "$PWD/release/binaries:/release:ro" \
            alpine:3.21 \
            /release/luna-linux-x64-musl --version
          docker run --rm \
            -v "$PWD/release/binaries:/release:ro" \
            -e LUNA_HOME=/tmp/luna \
            alpine:3.21 \
            /release/luna-linux-x64-musl \
            help catalog query=project limit=5 output=json interactive=false \
            | node -e "JSON.parse(require('fs').readFileSync(0, 'utf8'))"

      - name: Upload tested binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cli-binary-${{ matrix.asset }}
          path: release/binaries/${{ matrix.asset }}
          if-no-files-found: error
          retention-days: 7

  npm-package:
    name: Build and smoke npm package
    needs:
      - metadata
      - quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Build npm distribution
        run: pnpm --filter @liteyukistudio/luna-cli build

      - name: Pack npm tarball
        id: pack
        run: node scripts/cli/pack-npm.mjs --output=release/npm

      - name: Smoke-test npm and pnpm global installs
        run: >-
          node scripts/cli/smoke-npm.mjs
          --tarball="${{ steps.pack.outputs.tarball }}"
          --version="${{ needs.metadata.outputs.version }}"

      - name: Upload tested npm tarball
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: cli-npm-${{ needs.metadata.outputs.version }}
          path: release/npm/*.tgz
          if-no-files-found: error
          retention-days: 7

  publish-npm:
    name: Publish npm with trusted publishing
    needs:
      - metadata
      - binary
      - npm-package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Install OIDC-capable npm CLI
        run: npm install --global npm@11.6.2

      - name: Download tested npm tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: cli-npm-${{ needs.metadata.outputs.version }}
          path: release/npm

      - name: Publish or verify immutable npm version
        run: >-
          node scripts/cli/publish-npm.mjs
          --tarball="$(find release/npm -name '*.tgz' -type f -print -quit)"
          --npm-tag="${{ needs.metadata.outputs.npm_tag }}"
          --version="${{ needs.metadata.outputs.version }}"

  release:
    name: Attest and publish GitHub Release
    needs:
      - metadata
      - binary
      - npm-package
      - publish-npm
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ needs.metadata.outputs.tag }}

      - name: Download tested binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: cli-binary-*
          path: release/input
          merge-multiple: true

      - name: Download tested npm tarball
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: cli-npm-${{ needs.metadata.outputs.version }}
          path: release/input

      - name: Select stable or prerelease assets
        run: >-
          node scripts/cli/prepare-release-assets.mjs
          --input=release/input
          --output=release/final
          --prerelease="${{ needs.metadata.outputs.prerelease }}"

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: release/final
          format: spdx-json
          output-file: release/final/luna-cli.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest release provenance
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: |
            release/final/luna-linux-*
            release/final/luna-darwin-*
            release/final/luna-windows-*
            release/final/*.tgz

      - name: Preserve provenance bundle
        run: cp "${{ steps.provenance.outputs.bundle-path }}" release/final/build-provenance.sigstore.json

      - name: Attest release SBOM
        id: sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: |
            release/final/luna-linux-*
            release/final/luna-darwin-*
            release/final/luna-windows-*
            release/final/*.tgz
          sbom-path: release/final/luna-cli.spdx.json

      - name: Preserve SBOM attestation bundle
        run: cp "${{ steps.sbom.outputs.bundle-path }}" release/final/sbom-attestation.sigstore.json

      - name: Generate checksums and release manifest
        run: >-
          node scripts/cli/release-manifest.mjs
          --directory=release/final
          --tag="${{ needs.metadata.outputs.tag }}"
          --version="${{ needs.metadata.outputs.version }}"
          --commit="${{ needs.metadata.outputs.commit }}"
          --prerelease="${{ needs.metadata.outputs.prerelease }}"
          --npm-tag="${{ needs.metadata.outputs.npm_tag }}"

      - name: Upload assembled release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: luna-cli-release-${{ needs.metadata.outputs.version }}
          path: release/final/*
          if-no-files-found: error
          retention-days: 30

      - name: Create or complete GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node scripts/cli/publish-github-release.mjs
          --repository="${{ github.repository }}"
          --tag="${{ needs.metadata.outputs.tag }}"
          --directory=release/final
          --prerelease="${{ needs.metadata.outputs.prerelease }}"
