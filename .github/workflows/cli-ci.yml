name: CLI CI

on:
  pull_request:
    paths:
      - "cli/**"
      - "packages/api-*/**"
      - "openapi/**"
      - "scripts/cli/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/cli-ci.yml"
      - ".github/workflows/cli-release.yml"
  push:
    branches:
      - main
    paths:
      - "cli/**"
      - "packages/api-*/**"
      - "openapi/**"
      - "scripts/cli/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/cli-ci.yml"
      - ".github/workflows/cli-release.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cli-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Contract, test, package and host smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: pnpm

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release helper scripts
        run: node --test scripts/cli/tests/*.test.mjs

      - name: Check generated API contract drift
        run: node scripts/cli/verify-contract-drift.mjs

      - name: Type-check CLI
        run: pnpm --filter @liteyukistudio/luna-cli typecheck

      - name: Lint CLI
        run: pnpm --filter @liteyukistudio/luna-cli lint

      - name: Test CLI
        run: pnpm --filter @liteyukistudio/luna-cli test

      - name: Build npm distribution
        run: pnpm --filter @liteyukistudio/luna-cli build

      - name: Pack npm tarball
        id: pack
        run: node scripts/cli/pack-npm.mjs --output=release/npm

      - name: Smoke-test npm and pnpm global installs
        run: >-
          node scripts/cli/smoke-npm.mjs
          --tarball="${{ steps.pack.outputs.tarball }}"
          --version="$(node -p "require('./cli/package.json').version")"

      - name: Build host Bun binary
        run: >-
          node scripts/cli/build-binary.mjs
          --target=bun-linux-x64-baseline
          --output=release/ci/luna-linux-x64

      - name: Smoke-test host Bun binary
        run: >-
          node scripts/cli/smoke-command.mjs
          --command=release/ci/luna-linux-x64
          --version="$(node -p "require('./cli/package.json').version")"

      - name: Upload tested CI packages
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: luna-cli-ci-${{ github.sha }}
          path: |
            release/npm/*.tgz
            release/ci/luna-linux-x64
          if-no-files-found: error
          retention-days: 7
