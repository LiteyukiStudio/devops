{{- $fullname := include "luna-devops.fullname" . -}}
{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.url) (not .Values.externalDatabase.existingSecret) -}}
{{- fail "Set postgresql.enabled=true or provide externalDatabase.url/externalDatabase.existingSecret" -}}
{{- end -}}
{{- if and (not .Values.redis.enabled) (not .Values.externalRedis.addr) (not .Values.externalRedis.existingSecret) -}}
{{- fail "Set redis.enabled=true or provide externalRedis.addr/externalRedis.existingSecret" -}}
{{- end -}}
{{- $appSecretName := include "luna-devops.appSecretName" . -}}
{{- $appSecret := lookup "v1" "Secret" .Release.Namespace $appSecretName -}}
{{- $secretKey := .Values.app.secretEncryptionKey -}}
{{- if and (not $secretKey) $appSecret $appSecret.data (hasKey $appSecret.data .Values.app.secretEncryptionKeyKey) -}}
{{- $secretKey = (index $appSecret.data .Values.app.secretEncryptionKeyKey | b64dec) -}}
{{- end -}}
{{- if not $secretKey -}}
{{- $secretKey = randAlphaNum 48 -}}
{{- end -}}
{{- $pgSecretName := include "luna-devops.postgresqlSecretName" . -}}
{{- $pgSecret := lookup "v1" "Secret" .Release.Namespace $pgSecretName -}}
{{- $pgPassword := .Values.postgresql.auth.password -}}
{{- if and (not $pgPassword) $pgSecret $pgSecret.data (hasKey $pgSecret.data .Values.postgresql.auth.passwordKey) -}}
{{- $pgPassword = (index $pgSecret.data .Values.postgresql.auth.passwordKey | b64dec) -}}
{{- end -}}
{{- if not $pgPassword -}}
{{- $pgPassword = randAlphaNum 32 -}}
{{- end -}}
{{- if not .Values.app.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appSecretName }}
  labels:
    {{- include "luna-devops.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.app.secretEncryptionKeyKey }}: {{ $secretKey | quote }}
{{- end }}
{{- if or (not .Values.externalDatabase.existingSecret) (not .Values.externalRedis.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "luna-devops.connectionSecretName" . }}
  labels:
    {{- include "luna-devops.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.externalDatabase.existingSecret }}
  database-url: {{ default (printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" .Values.postgresql.auth.username $pgPassword (include "luna-devops.postgresqlName" .) .Values.postgresql.auth.database) .Values.externalDatabase.url | quote }}
  {{- end }}
  {{- if not .Values.externalRedis.existingSecret }}
  redis-addr: {{ default (printf "%s:6379" (include "luna-devops.redisName" .)) .Values.externalRedis.addr | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  labels:
    {{- include "luna-devops.componentLabels" (dict "root" . "component" "postgresql") | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgresql.auth.passwordKey }}: {{ $pgPassword | quote }}
{{- end }}
