{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "luna-devops.redisName" . }}
  labels:
    {{- include "luna-devops.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "luna-devops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "luna-devops.redisName" . }}
  labels:
    {{- include "luna-devops.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "luna-devops.redisName" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "luna-devops.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "luna-devops.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      automountServiceAccountToken: false
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              case "$REDIS_ADDR" in redis://*) ;; *) echo "built-in Redis requires a redis:// REDIS_ADDR" >&2; exit 1 ;; esac
              authority="${REDIS_ADDR#redis://}"
              authority="${authority%%/*}"
              credentials="${authority%@*}"
              encoded_password="${credentials#*:}"
              [ "$credentials" != "$authority" ] && [ "$encoded_password" != "$credentials" ] && [ -n "$encoded_password" ] || { echo "REDIS_ADDR must include a password" >&2; exit 1; }
              password="$(printf '%b' "$(printf '%s' "$encoded_password" | sed 's/%/\\x/g')")"
              exec redis-server --appendonly yes --requirepass "$password"
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: {{ include "luna-devops.redisURLSecretName" . }}
                  key: {{ include "luna-devops.redisURLSecretKey" . }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -u "$REDIS_ADDR" ping
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - redis-cli -u "$REDIS_ADDR" ping
            initialDelaySeconds: 5
            periodSeconds: 5
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.redis.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /data
          {{- end }}
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  {{- if .Values.redis.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          {{- toYaml .Values.redis.persistence.accessModes | nindent 10 }}
        {{- if .Values.redis.persistence.storageClass }}
        storageClassName: {{ .Values.redis.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.persistence.size | quote }}
  {{- end }}
{{- end }}
