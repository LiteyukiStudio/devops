apiVersion: v1
kind: Service
metadata:
  name: {{ include "liteyuki-devops.apiName" . }}
  labels:
    {{- include "liteyuki-devops.componentLabels" (dict "root" . "component" "api") | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "liteyuki-devops.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
