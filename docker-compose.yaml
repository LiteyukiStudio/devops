services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: devops
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-embed-web
      args:
        TARGET: api
    extra_hosts:
      - "dev.minikube.local:host-gateway"
    environment:
      API_ADDR: :8080
      APP_ENV: development
      DATABASE_URL: postgres://devops:devops@postgres:5432/devops?sslmode=disable
      PUBLIC_BASE_URL: http://localhost:8088
      APP_CORS_ORIGINS: http://localhost:8088
      REDIS_ADDR: redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8088:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: worker
    env_file:
      - .env.worker
    extra_hosts:
      - "dev.minikube.local:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
