version: 1
server:
  name: luna-devops
  displayName: Luna DevOps MCP
  description: 面向 Luna DevOps 的安全 MCP 工具集。
  transport:
    recommended: streamable-http
    endpoint: /api/v1/mcp
  auth:
    browserSession: true
    bearerAccessToken: true
    serviceToken: false

defaults:
  maxPageSize: 50
  logTailLines: 200
  confirmationExpiresInSeconds: 300
  output:
    redactSecrets: true
    truncateStringsAt: 8000

tools:
  - name: luna.dashboard.get
    title: 获取看板概览
    category: workspace
    risk: read
    authz: project:read
    description: 获取当前用户可见的 dashboard 摘要，包括项目空间和平台运行概览。
    http:
      method: GET
      path: /api/v1/dashboard
    inputSchema:
      type: object
      additionalProperties: false
      properties: {}

  - name: luna.projects.list
    title: 列出项目空间
    category: workspace
    risk: read
    authz: project:read
    description: 列出当前 actor 可访问的 project spaces。
    http:
      method: GET
      path: /api/v1/projects
    inputSchema:
      type: object
      additionalProperties: false
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        search:
          type: string

  - name: luna.projects.get
    title: 获取项目空间
    category: workspace
    risk: read
    authz: project:read
    description: 按 projectId 读取单个 project space 的基础信息。
    http:
      method: GET
      path: /api/v1/projects/{projectId}
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string

  - name: luna.applications.list
    title: 列出应用
    category: workspace
    risk: read
    authz: application:read
    description: 列出指定 project space 下的 applications。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/applications
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20

  - name: luna.application.topology.get
    title: 获取应用拓扑
    category: workspace
    risk: read
    authz: application:read
    description: 获取指定 application 当前关联的 Kubernetes resource topology。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/applications/{applicationId}/topology
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId, applicationId]
      properties:
        projectId:
          type: string
        applicationId:
          type: string

  - name: luna.repository_bindings.list
    title: 列出代码库绑定
    category: source
    risk: read
    authz: git:read
    description: 列出指定 project space 下的 repository bindings。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/repository-bindings
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string

  - name: luna.build_runs.list
    title: 列出构建记录
    category: build
    risk: read
    authz: build:read
    description: 列出指定 project space 下的 build runs。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/build-runs
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20

  - name: luna.build_run.get
    title: 获取构建记录
    category: build
    risk: read
    authz: build:read
    description: 读取单个 build run 的状态和结果。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/build-runs/{runId}
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId, runId]
      properties:
        projectId:
          type: string
        runId:
          type: string

  - name: luna.build_job.logs.get
    title: 获取构建日志
    category: build
    risk: read
    authz: build:read
    description: 获取经过截断的 build job log，用于诊断问题，不用于完整日志导出。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/build-jobs/{jobId}/logs
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId, jobId]
      properties:
        projectId:
          type: string
        jobId:
          type: string
        tailLines:
          type: integer
          minimum: 20
          maximum: 1000
          default: 200
    output:
      truncateStringsAt: 20000
      untrustedContent: true

  - name: luna.build_run.trigger
    title: 触发构建
    category: build
    risk: medium
    authz: build:trigger
    description: 在用户明确确认后，为指定 project space 触发一次 build run。
    http:
      method: POST
      path: /api/v1/projects/{projectId}/build-runs/trigger
    confirmation:
      required: true
      mode: preflight-token
      summaryTemplate: 即将为 project {projectId} 触发一次构建，请确认目标 repository binding、branch 和 registry 配置无误。
    inputSchema:
      type: object
      additionalProperties: true
      required: [projectId]
      properties:
        projectId:
          type: string

  - name: luna.build_run.cancel
    title: 取消构建
    category: build
    risk: medium
    authz: build:cancel
    description: 在用户确认后取消一个正在运行的 build run。
    http:
      method: POST
      path: /api/v1/projects/{projectId}/build-runs/{runId}/cancel
    confirmation:
      required: true
      mode: preflight-token
      summaryTemplate: 即将取消 project {projectId} 下的 build run {runId}。
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId, runId]
      properties:
        projectId:
          type: string
        runId:
          type: string

  - name: luna.releases.list
    title: 列出发布记录
    category: deployment
    risk: read
    authz: deployment:read
    description: 列出指定 project space 下的 releases。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/releases
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20

  - name: luna.release.create
    title: 创建发布
    category: deployment
    risk: high
    authz: deployment:release
    description: 在 preflight confirmation 通过后创建 release。执行前应先生成发布计划并让用户检查。
    http:
      method: POST
      path: /api/v1/projects/{projectId}/releases
    confirmation:
      required: true
      mode: preflight-token
      stepUpPurpose: deployment_release
      summaryTemplate: 即将在 project {projectId} 创建 release。确认前请检查 deployment target、image 和运行时影响。
    inputSchema:
      type: object
      additionalProperties: true
      required: [projectId]
      properties:
        projectId:
          type: string

  - name: luna.release.rollback
    title: 回滚发布
    category: deployment
    risk: high
    authz: deployment:rollback
    description: 在用户明确确认后回滚 release；如果启用了 MFA step-up，必须先完成二次验证。
    http:
      method: POST
      path: /api/v1/projects/{projectId}/releases/{releaseId}/rollback
    confirmation:
      required: true
      mode: preflight-token
      stepUpPurpose: deployment_rollback
      requiredPhraseTemplate: rollback {releaseId}
      summaryTemplate: 即将回滚 project {projectId} 下的 release {releaseId}。
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId, releaseId]
      properties:
        projectId:
          type: string
        releaseId:
          type: string

  - name: luna.gateway_routes.list
    title: 列出访问入口
    category: gateway
    risk: read
    authz: gateway:read
    description: 列出指定 project space 下的 gateway routes。
    http:
      method: GET
      path: /api/v1/projects/{projectId}/gateway-routes
    inputSchema:
      type: object
      additionalProperties: false
      required: [projectId]
      properties:
        projectId:
          type: string

  - name: luna.events.list
    title: 列出平台事件
    category: events
    risk: read
    authz: event:read
    description: 列出当前 actor 可见的近期 platform events。
    http:
      method: GET
      path: /api/v1/events
    inputSchema:
      type: object
      additionalProperties: false
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 50
          default: 20
        projectId:
          type: string
        level:
          type: string

  - name: luna.billing.summary.get
    title: 获取账单摘要
    category: billing
    risk: read
    authz: billing:read
    description: 读取当前 actor 可见的 billing summary。
    http:
      method: GET
      path: /api/v1/billing/summary
    inputSchema:
      type: object
      additionalProperties: false
      properties: {}

disabledTools:
  - name: luna.runtime.exec
    reason: runtime command execution 属于 critical 操作，需要等待 browser session 审批、MFA step-up 和 command digest audit 后再开放。
  - name: luna.runtime.terminal.authorize
    reason: interactive terminal access 在首版 MCP 中仅允许通过 browser console 使用。
  - name: luna.data_retention.cleanup
    reason: permanent cleanup 需要专门的 confirmation UX 和 administrator step-up。
  - name: luna.secret.value.read
    reason: MCP 不允许暴露 raw secret values。

plannedTools:
  - name: luna.confirmation.get
    title: 查询确认状态
    category: confirmation
    risk: read
    authz: project:read
    description: 查询 pending intent 的确认、执行和过期状态，主要供 external MCP client 在用户打开平台确认链接后轮询结果。
    http:
      method: GET
      path: /api/v1/confirmations/{confirmationId}
    inputSchema:
      type: object
      additionalProperties: false
      required: [confirmationId]
      properties:
        confirmationId:
          type: string
  - name: luna.confirmation.cancel
    title: 取消待确认操作
    category: confirmation
    risk: low
    authz: project:read
    description: 取消尚未执行的 pending intent。该工具不会执行原始高危操作。
    http:
      method: POST
      path: /api/v1/confirmations/{confirmationId}/reject
    inputSchema:
      type: object
      additionalProperties: false
      required: [confirmationId]
      properties:
        confirmationId:
          type: string
